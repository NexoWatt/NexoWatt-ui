<div id='smarthome-root'></div>

<script>
async function loadSmartHomeData() {
    try {
        const resp = await fetch('/state/smartHome.roomsJSON');
        const data = await resp.json();
        const rooms = JSON.parse(data.val || "{}");
        const root = document.getElementById("smarthome-root");
        root.innerHTML = "";
        Object.values(rooms).forEach(room => {
            const el = document.createElement("div");
            el.className = "room-tile";
            el.innerHTML = `
                <img class='room-icon' src='' style='width:28px;opacity:.85;margin-bottom:6px;' onload='this.src=getRoomIcon(room.name)'/><div class="room-name">${room.name}</div>
                <div class="room-count">${room.deviceDetails.length} Geräte</div>
            `;
            root.appendChild(el);
        });
    } catch (e) {
        console.error(e);
    }
}
document.addEventListener("DOMContentLoaded", loadSmartHomeData);
</script>
<script>
function getRoomIcon(roomName){
    roomName = roomName.toLowerCase();

    if(roomName.includes("wohn") || roomName.includes("living"))
        return "icons/nexowatt/room-living.svg";

    if(roomName.includes("küche") || roomName.includes("kueche") || roomName.includes("kitchen"))
        return "icons/nexowatt/room-kitchen.svg";

    if(roomName.includes("schlaf") || roomName.includes("bed"))
        return "icons/nexowatt/room-bedroom.svg";

    if(roomName.includes("bad") || roomName.includes("bath"))
        return "icons/nexowatt/room-bath.svg";

    if(roomName.includes("büro") || roomName.includes("office"))
        return "icons/nexowatt/room-office.svg";

    if(roomName.includes("garage"))
        return "icons/nexowatt/room-garage.svg";

    return "icons/nexowatt/room-living.svg";
}
</script>

<script>
function getDeviceIcon(dev){
    if(dev.widget === "widget-switch") return "icons/nexowatt/icon-power.svg";
    if(dev.widget === "widget-dimmer") return "icons/nexowatt/icon-dimmer.svg";
    if(dev.widget === "widget-heating") return "icons/nexowatt/icon-heating.svg";
    if(dev.widget === "widget-shutter") return "icons/nexowatt/icon-shutter.svg";
    if(dev.widget === "widget-sensor") return "icons/nexowatt/icon-sensor.svg";
    return "icons/nexowatt/icon-warning.svg";
}
</script>

<script>
// generic state writer
async function writeState(id, val){
    await fetch('/set/' + encodeURIComponent(id), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({val:val})
    });
}

// widget renderer
function renderWidget(dev){
    if(dev.widget === "widget-switch"){
        return `<button onclick="writeState('${dev.id}', true)">Ein</button>
                <button onclick="writeState('${dev.id}', false)">Aus</button>`;
    }
    if(dev.widget === "widget-dimmer"){
        return `<input type='range' min='0' max='100' 
                oninput="writeState('${dev.id}', this.value)" />`;
    }
    if(dev.widget === "widget-heating"){
        return `<input type='number' min='5' max='30'
                onchange="writeState('${dev.id}', this.value)" placeholder='SOLL °C'/>`;
    }
    if(dev.widget === "widget-shutter"){
        return `<button onclick="writeState('${dev.id}', 'up')">Hoch</button>
                <button onclick="writeState('${dev.id}', 'stop')">Stopp</button>
                <button onclick="writeState('${dev.id}', 'down')">Runter</button>`;
    }
    if(dev.widget === "widget-sensor"){
        return `<div>(Sensorwert)</div>`;
    }
    return `<div>Kein Widget</div>`;
}

// replace device list rendering
html_original_openRoom = openRoomView.toString();
</script>

<script>
let smartHomeData = null;

async function loadSmartHomeData() {
    const resp = await fetch('/state/smartHome.roomsJSON');
    const data = await resp.json();
    smartHomeData = JSON.parse(data.val || "{}");
    renderRoomOverview();
}

function renderRoomOverview() {
    const root = document.getElementById("smarthome-root");
    root.innerHTML = "";
    Object.values(smartHomeData).forEach(room => {
        const el = document.createElement("div");
        el.className = "room-tile";
        el.onclick = () => openRoomView(room);
        el.innerHTML = `
            <img class='room-icon' src='' style='width:28px;opacity:.85;margin-bottom:6px;' onload='this.src=getRoomIcon(room.name)'/><div class="room-name">${room.name}</div>
            <div class="room-count">${room.deviceDetails.length} Geräte</div>
        `;
        root.appendChild(el);
    });
}

function openRoomView(room) {
    const root = document.getElementById("smarthome-root");
    root.innerHTML = `
        <div class="room-header">
            <button class="back-btn" onclick="renderRoomOverview()">Zurück</button>
            <div class="room-title">${room.name}</div>
        </div>
        <div id="device-list"></div>
    `;
    const list = document.getElementById("device-list"); startLiveUpdates(room);

    room.deviceDetails.forEach(dev => {
        const devEl = document.createElement("div"); devEl.id='dev-'+dev.id.replace(/[^a-zA-Z0-9]/g,'');
        devEl.className = "device-item";
        devEl.innerHTML = `
            <img class='device-icon' style='width:22px;margin-right:8px;opacity:.85;' src='' onload='this.src=getDeviceIcon(dev)'/><div class='device-info'><div class="device-name">${dev.id}</div>
            <div class="device-value" style="font-size:12px;opacity:0.7;">…</div></div><div class="device-widget">${${renderWidget(dev)}</div>
        `;
        list.appendChild(devEl);
    });
}

document.addEventListener("DOMContentLoaded", loadSmartHomeData);
</script>

<script>
// fetch value helper
async function fetchState(id){
    try{
        const resp = await fetch('/state/' + encodeURIComponent(id));
        const data = await resp.json();
        return data.val;
    }catch(e){return null;}
}

async function pollDeviceState(dev, el){
    const val = await fetchState(dev.id);
    if(val !== null){
        el.querySelector(".device-value").innerText = val;
    }
}

function startLiveUpdates(room){
    room.deviceDetails.forEach(dev=>{
        const el = document.getElementById("dev-"+dev.id.replace(/[^a-zA-Z0-9]/g,''));
        if(!el) return;
        setInterval(()=>pollDeviceState(dev, el), 3000);
    });
}
</script>
