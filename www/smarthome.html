<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>NexoWatt SmartHome</title>
  <link href="/static/styles.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/nexowatt-32.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0c0f12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NexoWatt EMS">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <a href="/" style="display:inline-flex;align-items:center;text-decoration:none;">
      <img alt="NexoWatt" src="/static/nexowatt-logo.png"/>
    </a>
  </div>
  <h1>SmartHome</h1>
</header>

<main class="content">
  <div id="nw-smarthome-root">
    <div class="nw-smarthome-header">
      <div>
        <div class="nw-smarthome-header__title">SmartHome</div>
        <div class="nw-smarthome-header__subtitle">
          Erste Switch-Kacheln im NexoWatt-Design (Demo · A3)
        </div>
      </div>
      <div style="font-size:0.7rem;color:#9ca3af;">
        <a href="/" style="color:inherit;text-decoration:none;">Zurück zur Live-Ansicht</a>
      </div>
    </div>

    <div id="nw-tiles-grid" class="nw-tiles-grid"></div>
    <div id="nw-smarthome-empty" style="display:none;font-size:0.8rem;color:#9ca3af;margin-top:12px;">
      Keine SmartHome-Geräte konfiguriert. Bitte in der Admin-Config unter „SmartHome (vorbereitet)“
      mindestens einen Datenpunkt (z.&nbsp;B. Wärmepumpe EIN/AUS) setzen.
    </div>
  </div>
</main>

<script src="/static/smarthome.js"></script>
</body>
</html>
