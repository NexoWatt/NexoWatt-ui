<div id='smarthome-root'></div>

<script>
async function loadSmartHomeData() {
    try {
        const resp = await fetch('/state/smartHome.roomsJSON');
        const data = await resp.json();
        const rooms = JSON.parse(data.val || "{}");
        const root = document.getElementById("smarthome-root");
        root.innerHTML = "";
        Object.values(rooms).forEach(room => {
            const el = document.createElement("div");
            el.className = "room-tile";
            el.innerHTML = `
                <img class='room-icon' src='' style='width:28px;opacity:.85;margin-bottom:6px;' onload='this.src=getRoomIcon(room.name)'/><div class="room-name">${room.name}</div>
                <div class="room-count">${room.deviceDetails.length} Geräte</div>
            `;
            root.appendChild(el);
        });
    } catch (e) {
        console.error(e);
    }
}
document.addEventListener("DOMContentLoaded", loadSmartHomeData);
</script>
<script>
async function updateDeviceName(dev){
    const newName = await loadDeviceSettings(dev.id);
    const el = document.getElementById('name-'+dev.id.replace(/[^a-zA-Z0-9]/g,''));
    if(el) el.innerText = newName;
}
</script>

<script>
async function loadDeviceSettings(id){
    try{
        const resp=await fetch('/state/smartHome.deviceSettings.'+encodeURIComponent(id)+'.name');
        const data=await resp.json();
        return data.val || id;
    }catch(e){
        return id;
    }
}

async function getDisplayName(dev){
    const name = await loadDeviceSettings(dev.id);
    return name;
}
</script>

<script>
async function saveDeviceName(dev){
    const newName=document.getElementById("popup-name-edit").value;
    await fetch('/set/smartHome.deviceSettings.'+encodeURIComponent(dev.id)+'.name',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({val:newName})
    });
    document.getElementById("popup-name").innerText=newName;
}
</script>

<script>
async function updateDeviceStatus(dev, el){
    const val = await fetchState(dev.id);
    if(val === null) return;

    el.classList.remove("active-light","active-heating","active-shutter","active-error");
    el.querySelector(".device-value").classList.remove("active");

    if(dev.widget==="widget-switch" || dev.widget==="widget-dimmer"){
        if(parseFloat(val) > 0){ 
            el.classList.add("active-light");
            el.querySelector(".device-value").classList.add("active");
        }
    }
    if(dev.widget==="widget-heating"){
        if(parseFloat(val) > 0){
            el.classList.add("active-heating");
        }
    }
    if(dev.widget==="widget-shutter"){
        if(val==="up" || val==="down"){
            el.classList.add("active-shutter");
        }
    }
    if(val==="error" || val==="fault"){
        el.classList.add("active-error");
    }
}

// integrate into polling
async function pollDeviceState(dev, el){
    const val = await fetchState(dev.id);
    if(val !== null){
        el.querySelector(".device-value").innerText = val;
    }
    updateDeviceStatus(dev, el); updateDeviceName(dev);
}
</script>

<script>
function groupDevices(room){
    const groups={
        light:[],
        heating:[],
        shutter:[],
        sensor:[],
        other:[]
    };

    /* grouped rendering */ renderGroupedDevices(room); return; room.deviceDetails.forEach(dev=>{
        if(dev.widget==="widget-switch" || dev.widget==="widget-dimmer")
            groups.light.push(dev);
        else if(dev.widget==="widget-heating")
            groups.heating.push(dev);
        else if(dev.widget==="widget-shutter")
            groups.shutter.push(dev);
        else if(dev.widget==="widget-sensor")
            groups.sensor.push(dev);
        else
            groups.other.push(dev);
    });

    return groups;
}

function renderGroupedDevices(room){
    const groups=groupDevices(room);
    const root=document.getElementById("device-list");
    root.innerHTML="";

    const labels={
        light:"Beleuchtung",
        heating:"Heizung",
        shutter:"Beschattung",
        sensor:"Sensoren",
        other:"Weitere Geräte"
    };

    Object.keys(groups).forEach(key=>{
        if(groups[key].length===0) return;
        const block=document.createElement("div");
        block.innerHTML=`<h3 style='color:white;margin:12px 0;'>${labels[key]}</h3>`;
        groups[key].forEach(dev=>{
            const devEl=document.getElementById("dev-"+dev.id.replace(/[^a-zA-Z0-9]/g,''));
            if(devEl) block.appendChild(devEl.cloneNode(true));
        });
        root.appendChild(block);
    });
}
</script>

<script>
function getRoomIcon(roomName){
    roomName = roomName.toLowerCase();

    if(roomName.includes("wohn") || roomName.includes("living"))
        return "icons/nexowatt/room-living.svg";

    if(roomName.includes("küche") || roomName.includes("kueche") || roomName.includes("kitchen"))
        return "icons/nexowatt/room-kitchen.svg";

    if(roomName.includes("schlaf") || roomName.includes("bed"))
        return "icons/nexowatt/room-bedroom.svg";

    if(roomName.includes("bad") || roomName.includes("bath"))
        return "icons/nexowatt/room-bath.svg";

    if(roomName.includes("büro") || roomName.includes("office"))
        return "icons/nexowatt/room-office.svg";

    if(roomName.includes("garage"))
        return "icons/nexowatt/room-garage.svg";

    return "icons/nexowatt/room-living.svg";
}
</script>

<script>
function getDeviceIcon(dev){
    if(dev.widget === "widget-switch") return "icons/nexowatt/icon-power.svg";
    if(dev.widget === "widget-dimmer") return "icons/nexowatt/icon-dimmer.svg";
    if(dev.widget === "widget-heating") return "icons/nexowatt/icon-heating.svg";
    if(dev.widget === "widget-shutter") return "icons/nexowatt/icon-shutter.svg";
    if(dev.widget === "widget-sensor") return "icons/nexowatt/icon-sensor.svg";
    return "icons/nexowatt/icon-warning.svg";
}
</script>

<script>
// generic state writer
async function writeState(id, val){
    await fetch('/set/' + encodeURIComponent(id), {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({val:val})
    });
}

// widget renderer
function renderWidget(dev){
    if(dev.widget === "widget-switch"){
        return `<button onclick="writeState('${dev.id}', true)">Ein</button>
                <button onclick="writeState('${dev.id}', false)">Aus</button>`;
    }
    if(dev.widget === "widget-dimmer"){
        return `<input type='range' min='0' max='100' 
                oninput="writeState('${dev.id}', this.value)" />`;
    }
    if(dev.widget === "widget-heating"){
        return `<input type='number' min='5' max='30'
                onchange="writeState('${dev.id}', this.value)" placeholder='SOLL °C'/>`;
    }
    if(dev.widget === "widget-shutter"){
        return `<button onclick="writeState('${dev.id}', 'up')">Hoch</button>
                <button onclick="writeState('${dev.id}', 'stop')">Stopp</button>
                <button onclick="writeState('${dev.id}', 'down')">Runter</button>`;
    }
    if(dev.widget === "widget-sensor"){
        return `<div>(Sensorwert)</div>`;
    }
    return `<div>Kein Widget</div>`;
}

// replace device list rendering
html_original_openRoom = openRoomView.toString();
</script>

<script>
// fetch value helper
async function fetchState(id){
    try{
        const resp = await fetch('/state/' + encodeURIComponent(id));
        const data = await resp.json();
        return data.val;
    }catch(e){return null;}
}

async function pollDeviceState(dev, el){
    const val = await fetchState(dev.id);
    if(val !== null){
        el.querySelector(".device-value").innerText = val;
    }
}

function startLiveUpdates(room){
    /* grouped rendering */ renderGroupedDevices(room); return; room.deviceDetails.forEach(dev=>{
        const el = document.getElementById("dev-"+dev.id.replace(/[^a-zA-Z0-9]/g,''));
        if(!el) return;
        setInterval(()=>pollDeviceState(dev, el), 3000);
    });
}
</script>

  </div>

<script>
let popupInterval=null;

function openPopup(dev){
  const overlay=document.getElementById("device-popup-overlay");
  const icon=document.getElementById("popup-icon");
  const name=document.getElementById("popup-name");
  const value=document.getElementById("popup-value");
  const edit=document.getElementById("popup-name-edit");
  const widget=document.getElementById("popup-widget");

  icon.src=getDeviceIcon(dev);
  name.innerText=dev.id;
  edit.value=dev.id;
  value.innerText="…";

  widget.innerHTML = renderWidget(dev);

  overlay.style.display="flex";

  if(popupInterval) clearInterval(popupInterval);
  popupInterval = setInterval(async ()=>{
      const v=await fetchState(dev.id);
      if(v!==null) value.innerText=v;
  },1500);
}

function closePopup(){
  document.getElementById("device-popup-overlay").style.display="none";
  if(popupInterval) clearInterval(popupInterval);
}
</script>
