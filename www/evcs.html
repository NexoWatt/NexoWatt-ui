<!DOCTYPE html>

<script>/*nw_base_normalize*/
(function(){
  try {
    var p = window.location.pathname || '';
    // If opened as .../nexowatt-vis (no trailing slash and no .html), redirect to .../nexowatt-vis/index.html
    if (!p.endsWith('/') && !/\.html?$/i.test(p)) {
      window.location.replace(p + '/index.html' + (window.location.search||'') + (window.location.hash||''));
    }
  } catch(e) {}
})();
</script>

<script>
/* NexoWatt: normalize base path so relative links work even if opened without trailing slash */
(function () {
  try {
    var p = window.location.pathname || "";
    if (p && !p.endsWith("/") && !p.endsWith(".html")) {
      window.location.replace(p + "/" + window.location.search + window.location.hash);
    }
  } catch (e) {}
})();
</script>
